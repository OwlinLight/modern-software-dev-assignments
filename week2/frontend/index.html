<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Action Item Extractor</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif; margin: 2rem auto; max-width: 800px; padding: 0 1rem; }
      h1 { font-size: 1.5rem; }
      textarea { width: 100%; min-height: 160px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace; }
      button { padding: 0.5rem 1rem; }
      .items, .notes { margin-top: 1rem; }
      .item { display: flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0; }
      .note { padding: 0.75rem 0; border-top: 1px solid #e5e7eb; }
      .note:first-child { border-top: 0; }
      .note-content { white-space: pre-wrap; margin: 0.25rem 0 0; }
      .muted { color: #6b7280; font-size: 0.875rem; }
      .row { display: flex; gap: 0.5rem; align-items: center; }
    </style>
  </head>
  <body>
    <h1>Action Item Extractor</h1>
    <p class="muted">Paste notes and extract actionable items. Minimal raw HTML frontend.</p>

    <label for="text">Notes</label>
    <textarea id="text" placeholder="Paste notes here...&#10;e.g.&#10;- [ ] Set up database&#10;- Implement extract endpoint"></textarea>
    <div class="row">
      <label class="row"><input id="save_note" type="checkbox" checked /> Save as note</label>
      <button id="extract" type="button">Extract (rules)</button>
      <button id="extract_llm" type="button">Extract (LLM)</button>
      <button id="list_notes" type="button">List Notes</button>
    </div>
    <p class="muted">Rules: fast, offline heuristics. LLM: uses Ollama (<code>llama3.1:8b</code>) — requires a running model.</p>

    <div class="items" id="items"></div>
    <div class="notes" id="notes"></div>

    <script>
      const $ = (sel) => document.querySelector(sel);
      const itemsEl = $('#items');
      const notesEl = $('#notes');

      async function runExtract(path, label) {
        const text = $('#text').value;
        const save = $('#save_note').checked;
        itemsEl.textContent = label + '…';
        try {
          const res = await fetch(path, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text, save_note: save }),
          });
          if (!res.ok) {
            const errBody = await res.json().catch(() => ({}));
            const detail = errBody.detail;
            const msg = typeof detail === 'string' ? detail
              : Array.isArray(detail) ? detail.map((d) => d.msg || d).join(' ')
              : 'Request failed';
            throw new Error(msg);
          }
          const data = await res.json();
          if (!data.items || data.items.length === 0) {
            itemsEl.innerHTML = '<p class="muted">No action items found.</p>';
            return;
          }
          itemsEl.innerHTML = data.items.map(it => (
            `<div class="item"><input type="checkbox" data-id="${it.id}" /> <span>${it.text}</span></div>`
          )).join('');
          itemsEl.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', async (e) => {
              const id = e.target.getAttribute('data-id');
              await fetch(`/action-items/${id}/done`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ done: e.target.checked }),
              });
            });
          });
        } catch (err) {
          console.error(err);
          itemsEl.textContent = err.message || 'Error extracting items';
        }
      }

      async function listNotes() {
        notesEl.textContent = 'Loading notes…';
        try {
          const res = await fetch('/notes');
          if (!res.ok) {
            throw new Error('Failed to fetch notes');
          }
          const notes = await res.json();
          if (!Array.isArray(notes) || notes.length === 0) {
            notesEl.innerHTML = '<p class="muted">No saved notes yet.</p>';
            return;
          }
          notesEl.innerHTML = notes.map(note => (
            `<div class="note">
              <div><strong>Note #${note.id}</strong> <span class="muted">${note.created_at}</span></div>
              <p class="note-content">${note.content}</p>
            </div>`
          )).join('');
        } catch (err) {
          console.error(err);
          notesEl.textContent = err.message || 'Error loading notes';
        }
      }

      $('#extract').addEventListener('click', () =>
        runExtract('/action-items/extract', 'Extracting (rules)'));
      $('#extract_llm').addEventListener('click', () =>
        runExtract('/action-items/extract/llm', 'Extracting (LLM)'));
      $('#list_notes').addEventListener('click', listNotes);
    </script>
  </body>
  </html>
